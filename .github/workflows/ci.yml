name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q
      - name: Smoke
        run: |
          catalyst-mcp-cache-smoke > smoke.json
          cat smoke.json
          python -m json.tool smoke.json >/dev/null
          python - <<'PY'
          import json
          data = json.load(open("smoke.json", encoding="utf-8"))
          assert data["report"]["commercial_contact"] == "hello@strategic-innovations.ai"
          assert data["report"]["tools"] == 24
          assert data["report"]["context_saved_pct"] > 80.0
          assert data["tools_list"]["tools"][0]["inputSchema"]["$ref"].startswith("hkvc://tool/")
          PY
